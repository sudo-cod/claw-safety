version: 2

agents:
  main:
    default: require_approval

    always_allow:
      commands:
        - ls
        - pwd
        - whoami
        - echo
        - cat
        - grep
        - find
        - head
        - tail
        - wc
        - diff
        - git status
        - git log
        - git diff
      read_paths:
        - /tmp/
        - ~/workspace/
        - ~/Downloads/claw-safety/
      write_paths:
        - /tmp/

    require_approval:
      commands:
        - pip install
        - npm install
        - brew install
        - curl
        - wget
        - git push
        - git commit
        - git clone
      read_paths: []
      write_paths:
        - ~/Documents/
        - ~/Desktop/

    always_block:
      commands:
        - "rm\\s+-[a-z]*r[a-z]*f"
        - "rm\\s+-[a-z]*f[a-z]*r"
        - "curl.*\\|\\s*(bash|sh|zsh)"
        - "wget.*\\|\\s*(bash|sh|zsh)"
        - "find\\s+.*-delete"
        - "mkfs"
        - "dd\\s+if="
        - "chmod\\s+777"
        - ":\\(\\)\\{.*\\|.*&\\s*\\};"
        - "shutil\\.rmtree"
        - "claw-safety"
        - "openclaw\\.json"
        - "auth-profiles"
        - "credentials"
        - "\\.openclaw/agents"
      read_paths:
        - ~/.openclaw/credentials/
        - ~/.openclaw/agents/
        - ~/.ssh/
        - ~/.aws/
        - ~/.gnupg/
        - ~/.env
        - ~/.netrc
      write_paths:
        - ~/.openclaw/
        - /etc/
        - /root/
        - ~/.ssh/

  default:
    default: require_approval
    always_allow:
      commands: [ls, pwd, whoami, echo, cat, grep]
      read_paths: [/tmp/]
      write_paths: []
    require_approval:
      commands: []
      write_paths: []
    always_block:
      commands:
        - "rm\\s+-[a-z]*r[a-z]*f"
        - "curl.*\\|\\s*(bash|sh|zsh)"
      read_paths:
        - ~/.openclaw/credentials/
        - ~/.ssh/
      write_paths:
        - ~/.openclaw/
        - /etc/
        - ~/.ssh/
