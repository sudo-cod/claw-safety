version: 2

agents:
  main:
    default: require_approval   # fallback for anything not matched: allow | require_approval | block

    always_allow:
      commands:                 # substring match against the full command string (case-insensitive)
        - ls
        - pwd
        - whoami
        - echo
        - cat
        - grep
        - find
        - head
        - tail
        - wc
        - diff
        - git status
        - git log
        - git diff
      read_paths:
        - /tmp/
        - ~/workspace/
      write_paths: []

    require_approval:
      commands:                 # substring match
        - pip install
        - npm install
        - brew install
        - curl
        - wget
        - git push
        - git commit
        - git clone
      write_paths:
        - ~/Documents/
        - ~/Desktop/

    always_block:
      commands:                 # regex patterns, matched case-insensitive
        - "rm\\s+-[a-z]*r[a-z]*f"
        - "curl.*\\|\\s*(bash|sh|zsh)"
        - "wget.*\\|\\s*(bash|sh|zsh)"
        - "mkfs"
        - "dd\\s+if="
        - "chmod\\s+777"
        - ":\\(\\)\\{.*\\|.*&\\s*\\};"
        - "shutil\\.rmtree"
        - "claw-safety"
        - "openclaw\\.json"
      write_paths:
        - ~/.openclaw/
        - /etc/
        - /root/
        - ~/.ssh/

  default:
    default: require_approval
    always_allow:
      commands: [ls, pwd, whoami, echo, cat, grep]
      read_paths: [/tmp/]
      write_paths: []
    require_approval:
      commands: []
      write_paths: []
    always_block:
      commands:
        - "rm\\s+-[a-z]*r[a-z]*f"
        - "curl.*\\|\\s*(bash|sh|zsh)"
        - "wget.*\\|\\s*(bash|sh|zsh)"
      write_paths:
        - ~/.openclaw/
        - /etc/
        - ~/.ssh/
